<!DOCTYPE html>
<html>

<head>

<title>Card Strategy Trainer</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Card Strategy Trainer</h1>

<div id="points">Points: 1000</div>

<div id="stats">
Rounds: <span id="rounds">0</span>
Wins: <span id="wins">0</span>
Losses: <span id="losses">0</span>
</div>

<hr>

<h2>Bet</h2>

<div id="chips">
<button onclick="setBet(10)">+10</button>
<button onclick="setBet(50)">+50</button>
<button onclick="setBet(100)">+100</button>
</div>

Current Bet: <span id="betDisplay">0</span>

<hr>

<button onclick="start()">Start Round</button>
<button onclick="add()">Add 1000 Points</button>

<hr>

<h2>Dealer</h2>
<div class="cards" id="dealer"></div>
<div id="dealerTotal"></div>

<h2>You</h2>
<div class="cards" id="player"></div>
<div id="playerTotal"></div>

<hr>

<button id="hitBtn" onclick="hit()">Hit</button>
<button id="standBtn" onclick="stand()">Stand</button>
<button id="doubleBtn" onclick="doublePlay()">Double</button>

<h3 id="msg"></h3>

<script src="game.js"></script>

</body>

</html>
