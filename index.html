<!DOCTYPE html>
<html>
<head>
<title>Blackjack</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Blackjack</h1>

<div id="bankroll">Bankroll: $1000</div>

<div>
Bet: <input id="betInput" type="number" value="100">
<button onclick="placeBet()">Place Bet</button>
<button onclick="rebuy()">Rebuy +1000</button>
</div>

<hr>

<h2>Dealer</h2>
<div id="dealerCards"></div>
<div id="dealerTotal"></div>

<h2>Player</h2>
<div id="playerCards"></div>
<div id="playerTotal"></div>

<hr>

<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<button onclick="doubleDown()">Double</button>
<button onclick="split()">Split</button>
<button onclick="insurance()">Insurance</button>

<h3 id="message"></h3>

<script src="script.js"></script>

</body>
</html>
